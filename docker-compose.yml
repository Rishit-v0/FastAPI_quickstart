services:
  db:
    image: postgres:15-alpine
    container_name: fastapi_postgres
    environment:
      POSTGRES_DB: fastapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - fastapi_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"    # 5433 on host to avoid conflict with Django's 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fastapi_web
    restart: unless-stopped
    # uvicorn with --reload for development inside Docker
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app    # mount code so changes reflect without rebuild
    ports:
      - "8001:8000"    # host:container — access on localhost:8001
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  fastapi_postgres_data: